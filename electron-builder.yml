appId: com.manuscriptvault.manager
productName: Manuscript Vault Manager
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - package.json
asar: true
win:
  target: nsis
  icon: resources/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
